<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>비유니드 견적서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0d2d6b;
    --blue: #1a6fd8;
    --muted: #6b7a99;
    --border: #d0d8ee;
    --bg: #f0f3fa;
    --card: #ffffff;
    --green: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    font-size: 14px;
    color: #1a1a2e;
  }

  /* ── 로딩 ── */
  #loading-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; color: var(--muted);
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 오류 ── */
  #error-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 12px; padding: 32px;
    text-align: center;
  }
  #error-screen .icon { font-size: 56px; }
  #error-screen .err-title { font-size: 17px; font-weight: 700; color: #e53e3e; }
  #error-screen .err-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* ── 상단 툴바 ── */
  #toolbar {
    display: none;
    position: sticky; top: 0; z-index: 100;
    background: var(--navy);
    padding: 12px 16px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  #toolbar .brand {
    font-size: 13px; font-weight: 600;
    color: #fff; opacity: 0.92;
    white-space: nowrap;
  }
  #toolbar .actions { display: flex; gap: 8px; }
  #toolbar button {
    padding: 8px 14px; border-radius: 8px;
    border: none; cursor: pointer;
    font-size: 13px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  #btn-save { background: rgba(255,255,255,0.15); color: #fff; }
  #btn-pdf  { background: #fff; color: var(--navy); }

  /* ── 메인 래퍼 ── */
  #quote-wrap {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 12px 80px;
  }

  /* ── 카드 공통 ── */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(13,45,107,0.06);
  }

  /* ── 견적서 헤더 카드 ── */
  .header-card {
    background: var(--navy);
    border-radius: 14px;
    padding: 22px 20px 18px;
    margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(13,45,107,0.2);
  }
  .header-card .company-name {
    font-size: 15px; font-weight: 700;
    color: rgba(255,255,255,0.75);
    margin-bottom: 6px;
  }
  .header-card .doc-title {
    font-size: 28px; font-weight: 700;
    color: #fff; letter-spacing: 6px;
    margin-bottom: 12px;
  }
  .header-card .meta-row {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .meta-badge {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px; color: rgba(255,255,255,0.85);
  }
  .meta-badge strong { color: #fff; }

  /* ── 수신/공급 카드 ── */
  .parties-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .party-card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(13,45,107,0.06);
  }
  .party-label {
    padding: 8px 16px;
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
  }
  .party-label.recv { background: var(--navy); color: #fff; }
  .party-label.supp { background: #e8f0fd; color: var(--navy); }
  .party-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
  .party-row { display: flex; gap: 10px; font-size: 13px; align-items: flex-start; }
  .party-row .lbl { color: var(--muted); min-width: 46px; font-size: 12px; padding-top: 1px; }
  .party-row .val { font-weight: 600; flex: 1; word-break: break-all; }

  /* ── 납품/유효기간 ── */
  .dates-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(13,45,107,0.06);
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .date-item { display: flex; flex-direction: column; gap: 2px; }
  .date-item .dlbl { font-size: 11px; color: var(--muted); }
  .date-item .dval { font-size: 13px; font-weight: 600; color: var(--navy); }

  /* ── 품목 카드 ── */
  .items-card { background: var(--card); border-radius: 14px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(13,45,107,0.06); }
  .items-header {
    background: var(--navy);
    color: #fff;
    padding: 10px 16px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
  }
  .item-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .item-name { font-size: 14px; font-weight: 700; color: #1a1a2e; flex: 1; }
  .item-num { font-size: 11px; color: var(--muted); background: #f0f3fa; border-radius: 12px; padding: 2px 8px; white-space: nowrap; }
  .item-spec { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .item-bottom { display: flex; justify-content: space-between; align-items: center; }
  .item-brand-cat { font-size: 11px; color: var(--muted); }
  .item-price-wrap { text-align: right; }
  .item-unit { font-size: 11px; color: var(--muted); }
  .item-total { font-size: 15px; font-weight: 700; color: var(--navy); }

  /* ── 금액 요약 카드 ── */
  .price-card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(13,45,107,0.06);
  }
  .price-header {
    background: #f8f9fc;
    padding: 10px 16px;
    font-size: 12px; font-weight: 700; color: var(--navy); letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .price-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid #f0f3fa;
  }
  .price-row:last-child { border-bottom: none; }
  .price-row .plbl { color: var(--muted); }
  .price-row .pval { font-weight: 600; }
  .price-row.total-row {
    background: #e8f0fd;
    padding: 14px 16px;
    border-bottom: none;
  }
  .price-row.total-row .plbl { font-size: 14px; font-weight: 700; color: var(--navy); }
  .price-row.total-row .pval { font-size: 18px; font-weight: 700; color: var(--navy); }

  /* ── 메모 카드 ── */
  .memo-card { background: #fffbeb; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #fde68a; }
  .memo-title { font-size: 12px; font-weight: 700; color: #92400e; margin-bottom: 6px; }
  .memo-body { font-size: 13px; color: #78350f; line-height: 1.8; white-space: pre-wrap; }

  /* ── 푸터 ── */
  .q-footer {
    text-align: center; font-size: 11px; color: var(--muted);
    padding: 16px; line-height: 1.9;
    background: var(--card); border-radius: 14px;
    box-shadow: 0 2px 10px rgba(13,45,107,0.06);
  }

  /* ── 인쇄 ── */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    @page { size: A4; margin: 12mm; }
    #toolbar { display: none !important; }
    body { background: #fff; }
    #quote-wrap { padding: 0; max-width: 100%; }
    .card, .party-card, .items-card, .price-card, .memo-card, .q-footer {
      box-shadow: none; border: 1px solid var(--border);
      border-radius: 8px; break-inside: avoid;
    }
    .header-card { -webkit-print-color-adjust: exact !important; }
    .q-footer { position: fixed; bottom: 0; left: 0; right: 0; border-radius: 0; }
  }

  /* ── 태블릿/데스크탑 ── */
  @media (min-width: 640px) {
    #quote-wrap { padding: 24px 20px 80px; }
    .parties-wrap { flex-direction: row; }
    .party-card { flex: 1; }
    .card { padding: 24px; }
    .header-card { padding: 28px 28px 22px; }
    .header-card .doc-title { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading-screen">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:14px;">견적서 불러오는 중...</span>
</div>

<!-- 오류 -->
<div id="error-screen">
  <div class="icon">😕</div>
  <div class="err-title" id="error-msg">견적서를 찾을 수 없습니다</div>
  <div class="err-sub">링크가 만료되었거나 잘못된 주소입니다.<br>담당자에게 문의해 주세요.</div>
</div>

<!-- 툴바 -->
<div id="toolbar">
  <div class="brand">📄 비유니드 견적서</div>
  <div class="actions">
    <button id="btn-save" onclick="window.print()">🖨️ 인쇄</button>
    <button id="btn-pdf" onclick="window.print()">📥 PDF</button>
  </div>
</div>

<!-- 본문 -->
<div id="quote-wrap">
  <div id="qdoc-content"></div>
</div>

<script>
const { createClient } = supabase;
const SUPA_URL = 'https://emvczjswzyxlwqhymfmh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdmN6anN3enl4bHdxaHltZm1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTcxNDAsImV4cCI6MjA4OTg3MzE0MH0.hOLthetdToPnxLoU7wW8nW9DUC5JtN4j4LOPF8vaS6Y';
const db = createClient(SUPA_URL, SUPA_KEY);

function fmt(n) { return Number(n || 0).toLocaleString('ko-KR'); }

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  if (msg) document.getElementById('error-msg').textContent = msg;
}

async function loadQuote() {
  const token = new URLSearchParams(location.search).get('token');
  if (!token) { showError('링크가 올바르지 않습니다'); return; }

  const { data: q, error } = await db
    .from('quotes').select('*').eq('share_token', token).single();
  if (error || !q) { showError('견적서를 찾을 수 없습니다'); return; }

  const { data: items } = await db
    .from('quote_items').select('*').eq('quote_id', q.id).order('sort_order');

  renderQuote(q, items || []);
}

function renderQuote(q, items) {
  const discAmt  = q.discount_amount || 0;
  const supply   = q.supply_price || 0;
  const vat      = q.vat || 0;
  const total    = q.total || 0;
  const subtotal = q.subtotal || 0;
  const createdDate = new Date(q.created_at).toLocaleDateString('ko-KR');

  /* 헤더 카드 */
  const headerHtml = `
    <div class="header-card">
      <div class="company-name">비유니드 (주)</div>
      <div class="doc-title">견 적 서</div>
      <div class="meta-row">
        <div class="meta-badge"><strong>No.</strong> ${q.quote_number || '-'}</div>
        <div class="meta-badge"><strong>발행일</strong> ${createdDate}</div>
        ${q.valid_until ? `<div class="meta-badge"><strong>유효기간</strong> ${q.valid_until}</div>` : ''}
        ${q.delivery_date ? `<div class="meta-badge"><strong>납품희망일</strong> ${q.delivery_date}</div>` : ''}
      </div>
    </div>`;

  /* 수신/공급 카드 */
  const partiesHtml = `
    <div class="parties-wrap">
      <div class="party-card">
        <div class="party-label recv">수 &nbsp;&nbsp; 신</div>
        <div class="party-body">
          <div class="party-row"><span class="lbl">업체명</span><span class="val">${q.company_name || '-'}</span></div>
          ${q.contact_name ? `<div class="party-row"><span class="lbl">담당자</span><span class="val">${q.contact_name}</span></div>` : ''}
          ${q.contact_tel  ? `<div class="party-row"><span class="lbl">연락처</span><span class="val">${q.contact_tel}</span></div>` : ''}
          ${q.contact_email? `<div class="party-row"><span class="lbl">이메일</span><span class="val">${q.contact_email}</span></div>` : ''}
        </div>
      </div>
      <div class="party-card">
        <div class="party-label supp">공 &nbsp;&nbsp; 급</div>
        <div class="party-body">
          <div class="party-row"><span class="lbl">업체명</span><span class="val">비유니드 (주)</span></div>
          <div class="party-row"><span class="lbl">연락처</span><span class="val">031.8028.0464</span></div>
          <div class="party-row"><span class="lbl">이메일</span><span class="val">sales@buneed.co.kr</span></div>
          <div class="party-row"><span class="lbl">홈페이지</span><span class="val">www.buneed.co.kr</span></div>
        </div>
      </div>
    </div>`;

  /* 품목 카드 */
  const itemRowsHtml = items.map((it, i) => `
    <div class="item-row">
      <div class="item-top">
        <div class="item-name">${it.product_name || '-'}</div>
        <div class="item-num">${i + 1}번</div>
      </div>
      ${it.spec_summary ? `<div class="item-spec">${it.spec_summary}</div>` : ''}
      <div class="item-bottom">
        <div class="item-brand-cat">${[it.brand, it.category].filter(Boolean).join(' · ') || '-'} &nbsp;·&nbsp; ${it.qty || 1}개</div>
        <div class="item-price-wrap">
          <div class="item-unit">단가 ${fmt(it.unit_price)} 원</div>
          <div class="item-total">${fmt(it.total_price)} 원</div>
        </div>
      </div>
    </div>`).join('');

  const itemsHtml = `
    <div class="items-card">
      <div class="items-header">■ 견적 품목 (${items.length}종)</div>
      ${itemRowsHtml}
    </div>`;

  /* 금액 카드 */
  const priceHtml = `
    <div class="price-card">
      <div class="price-header">■ 금액 요약</div>
      <div class="price-row"><span class="plbl">소계</span><span class="pval">${fmt(subtotal)} 원</span></div>
      ${discAmt > 0 ? `<div class="price-row"><span class="plbl">할인</span><span class="pval" style="color:#e53e3e;">- ${fmt(discAmt)} 원</span></div>` : ''}
      <div class="price-row"><span class="plbl">공급가액</span><span class="pval">${fmt(supply)} 원</span></div>
      <div class="price-row"><span class="plbl">부가세 (10%)</span><span class="pval">${fmt(vat)} 원</span></div>
      <div class="price-row total-row"><span class="plbl">최종 합계</span><span class="pval">${fmt(total)} 원</span></div>
    </div>`;

  /* 메모 */
  const memoHtml = q.memo ? `
    <div class="memo-card">
      <div class="memo-title">📋 특이사항 / 메모</div>
      <div class="memo-body">${q.memo}</div>
    </div>` : '';

  /* 푸터 */
  const footerHtml = `
    <div class="q-footer">
      비유니드 (주)<br>
      Tel. 031.8028.0464 &nbsp;|&nbsp; sales@buneed.co.kr<br>
      경기도 하남시 미사강변한강로 135 다동 4층 445호<br>
      www.buneed.co.kr
    </div>`;

  document.getElementById('qdoc-content').innerHTML =
    headerHtml + partiesHtml + itemsHtml + priceHtml + memoHtml + footerHtml;

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('quote-wrap').style.display = 'block';
  document.title = `견적서 ${q.quote_number} · ${q.company_name}`;
}

loadQuote();
</script>
</body>
</html>
