<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구매 견적서 - 비유니드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f0f2f8;color:#1a2e5a;min-height:100vh;}
.page-wrap{max-width:820px;margin:0 auto;padding:24px 16px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.top-bar .logo{display:flex;align-items:center;gap:10px;}
.top-bar .logo img{height:36px;}
.top-bar .badge{background:#1e6fd9;color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;}
.print-btn{background:#1e6fd9;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;}
.print-btn:hover{background:#1558b0;}
.qdoc{background:#fff;border-radius:12px;padding:36px 40px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
.q-logo-area img{height:44px;margin-bottom:4px;}
.q-tel{font-size:10px;color:#6b7a99;margin-top:4px;}
h1{font-size:22px;font-weight:800;color:#1a2e5a;text-align:center;margin-bottom:20px;letter-spacing:.05em;}
.q-num{font-size:11px;color:#6b7a99;text-align:right;margin-top:4px;}
.q-parties{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.q-party{border:1px solid #d0d8ee;border-radius:8px;overflow:hidden;}
.q-party-header{background:#0d2d6b;color:#fff;padding:8px 14px;font-size:11px;font-weight:600;}
.q-party-header.sup{background:#e8f0fd;color:#0d2d6b;}
.q-party-body{padding:12px 14px;}
.q-field{display:flex;gap:8px;padding:4px 0;font-size:11px;}
.q-field .lbl{color:#6b7a99;width:50px;flex-shrink:0;}
.q-field .val{font-weight:600;}
.q-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:#f5f7fc;border:1px solid #d0d8ee;border-radius:8px;padding:14px 18px;margin-bottom:20px;}
.q-info-item .label{font-size:10px;color:#1e6fd9;font-weight:600;margin-bottom:2px;}
.q-info-item .value{font-size:13px;font-weight:700;color:#1a2e5a;}
.q-section{margin-bottom:20px;}
.q-section-title{font-size:11px;font-weight:700;color:#0d2d6b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;padding-bottom:6px;border-bottom:2px solid #c2d4f0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:#0d2d6b;color:#fff;padding:8px 10px;font-weight:600;text-align:left;}
tbody td{padding:8px 10px;border-bottom:1px solid #f1f5f9;}
tbody tr:nth-child(even){background:#f9fafc;}
.text-right{text-align:right;}
.q-summary table{width:340px;margin-left:auto;}
.q-summary td{padding:6px 10px;border-bottom:1px solid #f1f5f9;}
.total-row td{font-weight:800;font-size:15px;color:#0d2d6b;border-top:2px solid #0d2d6b;padding-top:10px;}
.discount-row td{color:#ef4444;font-size:12px;}
.q-footer{margin-top:28px;border-top:1px solid #e2e8f0;padding-top:16px;text-align:center;font-size:10px;color:#94a3b8;}
.loading{text-align:center;padding:80px;color:#94a3b8;font-size:14px;}
.error-box{text-align:center;padding:60px;color:#ef4444;}
.error-box h2{font-size:18px;margin-bottom:12px;}
.memo-box{background:#f5f7fc;border-radius:6px;padding:10px 14px;font-size:11px;color:#475569;}
@media print{
  .top-bar{display:none;}
  body{background:#fff;}
  .qdoc{box-shadow:none;border-radius:0;padding:20px;}
  @page{margin:10mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
</head>
